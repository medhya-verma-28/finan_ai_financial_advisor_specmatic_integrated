version: 3

systemUnderTest:
  service:
    $ref: "#/components/services/flask-ml-app-service"
    runOptions:
      $ref: "#/components/runOptions/localFlaskExecution"

components:
  sources:
    localFilesystemRepo:
      filesystem:
        directory: "."
  
  services:
    flask-ml-app-service:
      description: "Flask Machine Learning Inference Application Suite"
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/localFilesystemRepo"
            specs:
              - spec:
                  id: FinanSpec
                  path: "contracts/openapi.yaml"

  runOptions:
    localFlaskExecution:
      openapi:
        type: "test"
        specs:
          - spec:
              id: FinanSpec
              baseUrl: "http://flask-ml-app-service:5000"
        actuatorUrl: "http://flask-ml-app-service:5000/actuator/mappings"

specmatic:
  settings:
    test:
      timeoutInMilliseconds: 15000
      schemaResiliencyTests: none
    mock:
      generative: true
  governance:
    report:
      formats:
        - html
      outputDirectory: "build/reports/specmatic-contract-tests"
