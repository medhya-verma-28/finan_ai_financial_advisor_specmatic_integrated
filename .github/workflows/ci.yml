name: Specmatic Contract and Resiliency Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Test Reports Directory Structure
        run: |
          mkdir -p build/reports/specmatic-contract-tests/test/xml
          mkdir -p build/reports/specmatic-resiliency-tests/test/xml
          # Grant writing permissions to the docker container workspace
          chmod -R 777 build

      - name: Build Application Docker Image
        run: docker build -t finan-ml-app .

    # 3. Created an isolated container network bridge inside GitHub runner
      - name: Create Test Network
        run: docker network create financial-test-net

    # 4. Boot up the Flask application forced into testing environment mode
      - name: Start Flask App Container
        run: |
          docker run -d --name flask-ml-app-service --network financial-test-net -p 5000:5000 finan-ml-app

      - name: Run Standard Contract Tests
        run: |
          docker run --rm \
            --network host \
            -e REPORT_FOLDER="build/reports/specmatic-contract-tests" \
            -v "${{ github.workspace }}:/usr/src/app" \
            specmatic/specmatic:latest test \
            --testBaseURL=http://flask-ml-app-service:5000 \
            --junitReportDir=/usr/src/app/build/reports/specmatic-contract-tests/test/xml

      - name: Run Schema Resiliency Tests
        if: always() # Run even if standard contract tests fail
        run: |
          docker run --rm \
            --network host \
            -e REPORT_FOLDER="build/reports/specmatic-resiliency-tests" \
            -e SPECMATIC_SETTINGS_TEST_SCHEMAPRESILIENCYTESTS="all" \
            -v "${{ github.workspace }}:/usr/src/app" \
            specmatic/specmatic:latest test \
            --testBaseURL=http://flask-ml-app-service:5000 \
            --junitReportDir=/usr/src/app/build/reports/specmatic-resiliency-tests/test/xml

      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-test-reports
          path: build/reports/
