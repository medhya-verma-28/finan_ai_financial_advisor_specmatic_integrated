name: Specmatic Contract and Resiliency Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Pull repo code down into the GitHub runner instance
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Recreate your Enterprise Specmatic license text safely from GitHub Secrets
      - name: Create Specmatic License File
        run: |
          echo "${{ secrets.SPECMATIC_LICENSE_TEXT }}" > specmatic-license.txt

      # 3. Create structure and loosen write rights for rootless docker volumes
      - name: Create Test Reports Directory Structure
        run: |
          mkdir -p build/reports/specmatic-contract-tests/test/xml
          mkdir -p build/reports/specmatic-resiliency-tests/test/xml
          chmod -R 777 build

      # 4. Run the entire Docker Compose stack to completion
      # Specmatic contract runner runs first, then exits. Then resiliency runner runs and exits.
      - name: Run Docker Compose Tests
        env:
          LANGEXTRACT_API_KEY: ${{ secrets.LANGEXTRACT_API_KEY }}
        run: |
          docker compose up --build --exit-code-from specmatic-resiliency-runner


      # 5. Clean up stale testing networks and volumes cleanly
      # This runs even if tests fail, ensuring reports are flushed to the host runner filesystem
      - name: Remove Used Containers
        if: always()
        run: docker compose down

      # 6. Archive and save HTML/XML reports to your GitHub Dashboard
      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-test-reports
          path: build/reports/
