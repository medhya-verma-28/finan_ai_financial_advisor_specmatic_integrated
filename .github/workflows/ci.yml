name: Specmatic Contract and Resiliency Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  specmatic-tests:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Pull repo code down into the GitHub runner instance
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Recreate your Enterprise Specmatic license text safely from GitHub Secrets
      - name: Create Specmatic License File
        run: |
          echo "${{ secrets.SPECMATIC_LICENSE_TEXT }}" > specmatic-license.txt

      # 3. Create structure and loosen write rights for rootless docker volumes
      - name: Create Test Reports Directory Structure
        run: |
          mkdir -p build/reports/specmatic-contract-tests/test/xml
          mkdir -p build/reports/specmatic-resiliency-tests/test/xml
          chmod -R 777 build
          
      # 4a. Run the Flask App Container
      - name: Run the Flask App Container
        run: |
          docker compose up --build --attach flask-ml-app-service
          
      # 4b. Run the Specmatic Contract Runner and exit
      - name: Run Specmatic Contract Tests
        run: |
          docker compose up --abort-on-container-exit specmatic-contract-runner
        
      # 4c. Run the Resiliency Tests and exit
      - name: Run Specmatic Resiliency Tests
        run: |
          docker compose up --abort-on-container-exit specmatic-resiliency-runner

      # 4d. Clean up stopped containers
      - name: Remove Used Containers
        if: always()
        run: |
          docker compose down


      # 5. Archive and save HTML/XML reports to your GitHub Dashboard
      - name: Upload Test Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-test-reports
          path: build/reports/
