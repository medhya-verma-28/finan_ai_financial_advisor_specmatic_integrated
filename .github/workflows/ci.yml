name: ML App Contract Testing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contract-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pulled down the repository code files
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # 2. Built Flask ML Application container image locally in CI
    - name: Build Application Docker Image
      run: docker build -t finan-ml-app .

    # 3. Created an isolated container network bridge inside GitHub runner
    - name: Create Test Network
      run: docker network create financial-test-net

    # 4. Boot up the Flask application forced into testing environment mode
    - name: Start Flask App Container
      run: |
        docker run -d --name flask-ml-app-service --network financial-test-net -p 5000:5000 finan-ml-app

    # 5. Execute Specmatic directly to test the app container inside the network
    - name: Run Specmatic Resiliency and Contract Tests
      run: |
        docker run --rm \
          --name specmatic-runner \
          --network financial-test-net \
          -v "${{ github.workspace }}/specmatic.yaml:/usr/src/app/specmatic.yaml" \
          -v "${{ github.workspace }}/contracts:/usr/src/app/contracts" \
          specmatic/specmatic:latest test
